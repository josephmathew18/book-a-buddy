{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Poppins:400,600,700&display=swap" rel="stylesheet">

  <!-- Static CSS -->
  <link href="{% static 'css/style.css' %}" rel="stylesheet">

  <!-- Favicon -->
  <link rel="shortcut icon" href="{% static 'images/favicon.png' %}">
</head>

<body>

  <!-- BACKGROUND -->
  <div class="hero_bg_box">
    <img src="{% static 'images/labour.jpg' %}" alt="" style="width:100%; height:100vh; object-fit:cover;">
  </div>

  <!-- LOGIN BOX -->
  <div class="login-wrapper">

    <div class="login-box">
      <h2>Login</h2>

      <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
      </form>

      <p>Don't have an account?
        <a href="{% url 'reg' %}">Register here</a>
      </p>
    </div>

  </div>

  <!-- CSS -->
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
    }

    /* BACKGROUND FIX */
    .hero_bg_box {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    /* CENTER LOGIN */
    .login-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* LOGIN BOX */
    .login-box {
      width: 100%;
      max-width: 420px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 5px 25px rgba(0, 0, 0, 0.3);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
    }

    button:hover {
      background: #826B10;
    }

    p {
      margin-top: 15px;
    }

    a {
      color: black;
      font-weight: bold;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .login-box {
        margin: 10px;
        padding: 20px;
      }
    }
  </style>

</body>

</html>
