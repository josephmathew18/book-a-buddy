{%extends 'base.html'%}
{% load static %} {%block content%}
<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
    .username {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 18px;
        font-weight: bold;
    }
</style>


<p style="color:white" class="username">Welcome {{ request.user.username }} ({{ request.user.role }})</p>


<div class="container">
    <h2>Service Provider Details</h2>
    {% if error %}
    <p style="color: red; font-weight: bold; text-align: center;">{{ error }}</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <label for="name">Company Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="address">Address:</label>
        <input type="text" id="address" name="address" required>

        <label for="phno">Phone Number:</label>
        <input type="text" id="phno" name="phno" required>
        <br>
        <br>
        <button type="submit" class="btn">Submit</button>

    </form>

    </form><br>
</div>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
    }

    .container {
        width: 90%;
        max-width: 400px;
        margin: auto;
    }

    input,
    button {
        width: 100%;
    }

    @media (max-width: 600px) {
        .container {
            padding: 15px;
        }
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        text-decoration: dashed;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
    }

    input,
    select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
    }

    .btn {
        width: 100%;
        background-color: black;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    .btn:hover {
        background-color: #826B10;
    }

    p {
        text-align: center;
        margin-top: 15px;
    }

    a {
        color: white;
    }

    a:hover {
        text-decoration: underline;
    }
</style>

<script src="{% static 'js/jquery-3.4.1.min.js' %}"></script>
<script src="{% static 'js/bootstrap.js' %}"></script>
<script src="{% static 'js/custom.js' %}"></script>
</body>

</html>
{%endblock%}
