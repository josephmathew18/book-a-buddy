{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Providers</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: #f4f4f4;
        }

        /* MAIN CONTAINER */
        .main-container {
            max-width: 900px;
            margin: 50px auto;
        }

        /* CARD */
        .card-box {
            background: #826B10;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        /* HEADER */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* BUTTON */
        .home-btn {
            background: black;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
        }

        .home-btn:hover {
            background: #444;
        }

        /* LIST */
        ul {
            padding-left: 20px;
        }

        li {
            margin: 10px 0;
        }

        a {
            color: black;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        h2 {
            margin: 0;
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .main-container {
                margin: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="main-container">

        <div class="card-box">

            <div class="header-row">
                <h2>All Service Providers</h2>
                <a href="{% url 'home' %}" class="home-btn">Home</a>
            </div>

            <ul>
                {% for service_provider in service_providers %}
                <li>
                    <a href="{% url 'list_service_provider' service_provider.id %}">
                        {{ service_provider.company_name }}
                    </a>
                </li>
                {% empty %}
                <p>No service providers available.</p>
                {% endfor %}
            </ul>

        </div>

    </div>

</body>

</html>
